<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống XSMB Pro - Tự Động 2026</title>
    <style>
        :root {
            --bg-dark: #121212; --card-bg: #1e1e1e;
            --primary: #ff4d4d; --secondary: #2ecc71;
            --text: #e0e0e0; --blue: #3498db;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; padding-bottom: 40px; }
        .container { max-width: 500px; margin: auto; padding: 0 5px; }
        
        /* Tối ưu Tabs */
        .tabs { display: flex; background: #000; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .tab-item { flex: 1; padding: 15px 5px; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; color: #888; transition: 0.3s; }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #1a1a1a; }

        /* Kết quả trực tuyến */
        .live-box {
            width: 100%;
            height: 380px; 
            overflow: hidden;
            position: relative;
            background: #fff;
            border-radius: 8px;
            margin: 10px 0;
            border: 2px solid #333;
        }
        .live-box iframe {
            position: absolute;
            top: -75px; /* Căn chỉnh chuẩn bảng KQ */
            left: 0;
            width: 100%;
            height: 1500px;
            border: none;
        }

        /* Bàn phím số */
        .grid-num { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 5px 10px; }
        .btn-num { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px 0; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .btn-num:active { transform: scale(0.95); }
        .btn-num.active { background: var(--secondary); border-color: #fff; box-shadow: 0 0 10px rgba(46, 204, 113, 0.5); }
        
        #display-dan { background: #000; padding: 15px; margin: 15px 10px; border-radius: 8px; color: #00ff00; word-break: break-all; min-height: 50px; border: 1px dashed #555; font-family: 'Courier New', monospace; font-size: 14px; line-height: 1.5; }
        
        .panel { display: none; padding-bottom: 20px; }
        .panel.active { display: block; animation: fadeIn 0.3s; }
        
        h4 { margin: 15px 10px 8px; color: var(--primary); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        
        .quick-group { grid-template-columns: repeat(3, 1fr) !important; padding-bottom: 10px; }
        .btn-action { width: calc(100% - 20px); margin: 5px 10px; padding: 15px; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 15px; }
        .btn-copy { background: var(--blue); }
        .btn-process { background: var(--secondary); }

        /* Xiên */
        textarea { width: calc(100% - 20px); background: #222; color: #fff; border: 1px solid #444; padding: 10px; margin: 5px 10px; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        select { padding: 12px; width: calc(100% - 20px); background: #222; color: #fff; margin: 5px 10px; border-radius: 6px; border: 1px solid #444; }
        .result-box { background: #000; padding: 15px; color: #2ecc71; margin: 10px; border-radius: 8px; font-family: monospace; border: 1px solid #333; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="tabs">
            <div class="tab-item active" onclick="openTab(event, 'kq-ghep')">KẾT QUẢ & GHÉP SỐ</div>
            <div class="tab-item" onclick="openTab(event, 'xien')">XIÊN GHÉP</div>
        </div>

        <div id="kq-ghep" class="panel active">
            <div class="live-box">
                <iframe src="https://az24.vn/xsmb-30-ngay.html" scrolling="auto"></iframe>
            </div>

            <h4>ĐẦU (Hàng chục)</h4>
            <div class="grid-num" id="chuc-grid"></div>
            <div class="grid-num quick-group">
                <button class="btn-num" onclick="selectQuick('chuc', 'tai')">Tài</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'xiu')">Xỉu</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'tatca')">Hết</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'le')">Lẻ</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'chan')">Chẵn</button>
                <button class="btn-num" style="background:#600;" onclick="clearSet('chuc')">Xóa</button>
            </div>

            <h4>ĐUÔI (Hàng đơn vị)</h4>
            <div class="grid-num" id="dv-grid"></div>
            <div class="grid-num quick-group">
                <button class="btn-num" onclick="selectQuick('dv', 'tai')">Tài</button>
                <button class="btn-num" onclick="selectQuick('dv', 'xiu')">Xỉu</button>
                <button class="btn-num" onclick="selectQuick('dv', 'tatca')">Hết</button>
                <button class="btn-num" onclick="selectQuick('dv', 'le')">Lẻ</button>
                <button class="btn-num" onclick="selectQuick('dv', 'chan')">Chẵn</button>
                <button class="btn-num" style="background:#600;" onclick="clearSet('dv')">Xóa</button>
            </div>

            <div id="display-dan">Dàn số: (Chưa chọn)</div>
            <button class="btn-action btn-copy" id="btnCopyDan" onclick="copyToClipboard('display-dan', 'btnCopyDan')">SAO CHÉP DÀN</button>
        </div>

        <div id="xien" class="panel">
            <h2 style="font-size: 18px; text-align: center; margin-top: 20px;">Ghép Xiên Tự Động</h2>
            
            <h4 style="color:#888">Nhập dãy số muốn ghép:</h4>
            <textarea id="inputNumbers" rows="3" placeholder="Ví dụ: 01 02 15 27 88..."></textarea>
            
            <h4 style="color:#888">Số loại bỏ (số khan):</h4>
            <textarea id="excludeNumbers" rows="1" placeholder="Ví dụ: 13 49"></textarea>

            <h4 style="color:#888">Chọn loại xiên:</h4>
            <select id="xienType">
                <option value="2">Xiên 2 (Cặp 2 số)</option>
                <option value="3">Xiên 3 (Cặp 3 số)</option>
                <option value="4">Xiên 4 (Cặp 4 số)</option>
            </select>

            <button class="btn-action btn-process" onclick="processXien()">GHÉP KẾT QUẢ NGAY</button>
            
            <div id="resultContainer" style="display:none;">
                <div id="output" class="result-box"></div>
                <div id="count" style="font-size: 13px; margin: 10px; color: var(--secondary); font-weight: bold;"></div>
                <button id="copyXienBtn" class="btn-action btn-copy" onclick="copyXienToClipboard()">SAO CHÉP KẾT QUẢ</button>
            </div>
        </div>
    </div>

<script>
    let chucSet = new Set(), dvSet = new Set();
    let currentXienText = "";

    // SỬA LỖI 1: Xóa nội dung cũ trước khi render để tránh trùng lặp nút
    function initButtons() {
        const cGrid = document.getElementById('chuc-grid');
        const dGrid = document.getElementById('dv-grid');
        cGrid.innerHTML = ''; dGrid.innerHTML = '';
        for(let i=0; i<10; i++) {
            cGrid.innerHTML += `<button class="btn-num" id="c-${i}" onclick="toggleNum('chuc', ${i})">${i}</button>`;
            dGrid.innerHTML += `<button class="btn-num" id="d-${i}" onclick="toggleNum('dv', ${i})">${i}</button>`;
        }
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function toggleNum(type, n) {
        let set = (type === 'chuc') ? chucSet : dvSet;
        let id = (type === 'chuc') ? `c-${n}` : `d-${n}`;
        const btn = document.getElementById(id);
        
        if(set.has(n)) { 
            set.delete(n); 
            btn.classList.remove('active'); 
        } else { 
            set.add(n); 
            btn.classList.add('active'); 
        }
        renderDan();
    }

    // SỬA LỖI 2: Dùng if-else để logic chọn nhanh chính xác tuyệt đối
    function selectQuick(type, mode) {
        clearSet(type);
        for(let i=0; i<10; i++) {
            if(mode==='tai' && i>=5) toggleNum(type, i);
            else if(mode==='xiu' && i<5) toggleNum(type, i);
            else if(mode==='le' && i%2!==0) toggleNum(type, i);
            else if(mode==='chan' && i%2===0) toggleNum(type, i);
            else if(mode==='tatca') toggleNum(type, i);
        }
    }

    function clearSet(type) {
        if(type==='chuc') { 
            chucSet.clear(); 
            document.querySelectorAll('#chuc-grid .btn-num').forEach(b=>b.classList.remove('active')); 
        } else { 
            dvSet.clear(); 
            document.querySelectorAll('#dv-grid .btn-num').forEach(b=>b.classList.remove('active')); 
        }
        renderDan();
    }

    function renderDan() {
        let res = [];
        let chucArr = Array.from(chucSet).sort((a,b) => a-b);
        let dvArr = Array.from(dvSet).sort((a,b) => a-b);
        chucArr.forEach(c => { 
            dvArr.forEach(d => res.push(c + "" + d)); 
        });
        const out = document.getElementById('display-dan');
        out.innerText = res.length > 0 ? "Dàn (" + res.length + " số): " + res.join(", ") : "Dàn số: (Chưa chọn)";
    }

    // SỬA LỖI 4: Hiệu ứng nút bấm thay vì alert khó chịu
    function copyToClipboard(id, btnId) {
        const text = document.getElementById(id).innerText;
        if(text.includes(": ")) {
            const cleanText = text.split(": ")[1];
            navigator.clipboard.writeText(cleanText).then(() => {
                const btn = document.getElementById(btnId);
                const oldText = btn.innerText;
                btn.innerText = "ĐÃ SAO CHÉP!";
                btn.style.background = "#2ecc71";
                setTimeout(() => { 
                    btn.innerText = oldText; 
                    btn.style.background = "";
                }, 1500);
            });
        }
    }

    function processXien() {
        const input = document.getElementById('inputNumbers').value;
        const exclude = document.getElementById('excludeNumbers').value;
        const size = parseInt(document.getElementById('xienType').value);
        
        let numbers = input.split(/[\s, \n, \-]+/).filter(n => n.length > 0);
        let excludeList = exclude.split(/[\s, \n, \-]+/).filter(n => n.length > 0);
        
        // Chuẩn hóa số (thêm số 0 nếu nhập 1 chữ số)
        numbers = numbers.map(n => n.length === 1 ? '0' + n : n);
        excludeList = excludeList.map(n => n.length === 1 ? '0' + n : n);
        
        numbers = [...new Set(numbers)].filter(n => !excludeList.includes(n)).sort();

        if (numbers.length < size) { 
            alert(`Bạn cần nhập ít nhất ${size} số để ghép xiên ${size}!`); 
            return; 
        }

        let results = [];
        function combine(start, path) {
            if (path.length === size) { 
                results.push(path.join("-")); 
                return; 
            }
            for (let i = start; i < numbers.length; i++) { 
                combine(i + 1, [...path, numbers[i]]); 
            }
        }
        combine(0, []);
        
        currentXienText = results.join("\n");
        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('output').innerText = results.join(", ");
        document.getElementById('count').innerText = `Tổng cộng: ${results.length} cặp xiên ${size}`;
        window.scrollTo(0, document.body.scrollHeight);
    }

    function copyXienToClipboard() {
        navigator.clipboard.writeText(currentXienText).then(() => {
            const btn = document.getElementById('copyXienBtn');
            btn.innerText = "COPIED!";
            setTimeout(() => { btn.innerText = "SAO CHÉP KẾT QUẢ"; }, 1500);
        });
    }
    
    window.onload = initButtons;
</script>
</body>
</html>
