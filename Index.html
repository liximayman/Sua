<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống XSMB Pro 2026</title>
    <style>
        :root {
            --bg-dark: #121212; --card-bg: #1e1e1e;
            --primary: #ff4d4d; --secondary: #2ecc71;
            --text: #e0e0e0; --blue: #3498db;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; padding-bottom: 60px; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; }
        
        .tabs { display: flex; background: #000; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .tab-item { flex: 1; padding: 15px 5px; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; color: #888; transition: 0.3s; }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #1a1a1a; }

        .live-box {
            width: 100%; height: 320px; 
            overflow: hidden; position: relative;
            background: #fff; border-radius: 8px; margin: 10px 0;
        }
        .live-box iframe {
            position: absolute; top: -75px; left: 0;
            width: 100%; height: 1500px; border: none;
        }

        .grid-num { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; }
        .btn-num { background: #333; border: 1px solid #444; color: white; padding: 12px 0; border-radius: 5px; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-num:active { transform: scale(0.95); }
        .btn-num.active { background: var(--secondary); border-color: #fff; box-shadow: 0 0 10px rgba(46, 204, 113, 0.5); }
        
        #display-dan { 
            background: #000; padding: 15px; margin: 10px; border-radius: 8px; 
            color: #00ff00; word-break: break-all; min-height: 50px; 
            border: 1px dashed #555; font-family: 'Courier New', monospace; font-size: 14px; line-height: 1.6;
        }
        .panel { display: none; padding: 10px; animation: fadeIn 0.3s; }
        .panel.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h4 { margin: 15px 0 5px 10px; font-size: 13px; letter-spacing: 1px; }
        .btn-action { width: calc(100% - 20px); padding: 15px; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin: 10px; transition: 0.3s; }
        .btn-copy { background: var(--blue); }
        .btn-copy:hover { background: #2980b9; }
        
        /* Xiên */
        textarea { width: 100%; background: #222; color: #00ff00; border: 1px solid #444; padding: 10px; border-radius: 5px; box-sizing: border-box; font-family: monospace; }
        select { width: 100%; padding: 10px; background: #333; color: white; border: 1px solid #444; border-radius: 5px; margin: 10px 0; }
        .result-box { background: #000; padding: 10px; border-radius: 5px; border: 1px solid var(--secondary); margin-top: 10px; }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="tabs">
            <div class="tab-item active" onclick="openTab(event, 'main-tool')">KẾT QUẢ & GHÉP SỐ</div>
            <div class="tab-item" onclick="openTab(event, 'xien-tool')">XIÊN GHÉP</div>
        </div>

        <div id="main-tool" class="panel active">
            <div class="live-box">
                <iframe src="https://az24.vn/xsmb-30-ngay.html"></iframe>
            </div>

            <h4 style="color: var(--primary);">● CHỌN ĐẦU (Hàng chục)</h4>
            <div class="grid-num" id="chuc-grid"></div>
            <div class="grid-num" style="grid-template-columns: repeat(3, 1fr); padding-top:0;">
                <button class="btn-num" onclick="selectQuick('chuc', 'tai')">Tài</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'xiu')">Xỉu</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'tatca')">Tất cả</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'le')">Lẻ</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'chan')">Chẵn</button>
                <button class="btn-num" style="background:#600;" onclick="clearSet('chuc')">Xóa</button>
            </div>

            <h4 style="color: var(--blue);">● CHỌN ĐUÔI (Hàng đơn vị)</h4>
            <div class="grid-num" id="dv-grid"></div>
            <div class="grid-num" style="grid-template-columns: repeat(3, 1fr); padding-top:0;">
                <button class="btn-num" onclick="selectQuick('dv', 'tai')">Tài</button>
                <button class="btn-num" onclick="selectQuick('dv', 'xiu')">Xỉu</button>
                <button class="btn-num" onclick="selectQuick('dv', 'tatca')">Tất cả</button>
                <button class="btn-num" onclick="selectQuick('dv', 'le')">Lẻ</button>
                <button class="btn-num" onclick="selectQuick('dv', 'chan')">Chẵn</button>
                <button class="btn-num" style="background:#600;" onclick="clearSet('dv')">Xóa</button>
            </div>

            <div id="display-dan">Dàn số: (Chưa có số nào)</div>
            <button onclick="copyDan()" class="btn-action btn-copy">SAO CHÉP DÀN</button>
        </div>

        <div id="xien-tool" class="panel">
            <h3 style="text-align:center; color:var(--secondary)">Ghép Xiên Tự Động</h3>
            <p style="font-size:12px; color:#888;">Nhập các số cách nhau bằng dấu phẩy hoặc khoảng trắng:</p>
            <textarea id="inputNumbers" rows="4" placeholder="Ví dụ: 01 12 45 67 89"></textarea>
            
            <select id="xienType">
                <option value="2">Ghép Xiên 2</option>
                <option value="3">Ghép Xiên 3</option>
                <option value="4">Ghép Xiên 4</option>
            </select>

            <button onclick="processXien()" class="btn-action" style="background: var(--secondary);">BẮT ĐẦU GHÉP</button>
            
            <div id="resultContainer" style="display:none;">
                <div class="result-box" id="output"></div>
                <p id="count" style="font-size:13px; color: var(--blue); font-weight:bold;"></p>
                <button onclick="copyXien()" class="btn-action" style="background: #444;">SAO CHÉP KẾT QUẢ</button>
            </div>
        </div>
    </div>

<script>
    let chucSet = new Set(), dvSet = new Set();
    let currentXienResult = "";

    // Khởi tạo nút bấm
    function init() {
        const cGrid = document.getElementById('chuc-grid');
        const dGrid = document.getElementById('dv-grid');
        cGrid.innerHTML = ''; dGrid.innerHTML = '';
        for(let i=0; i<10; i++) {
            cGrid.innerHTML += `<button class="btn-num" id="c-${i}" onclick="toggleNum('chuc', ${i})">${i}</button>`;
            dGrid.innerHTML += `<button class="btn-num" id="d-${i}" onclick="toggleNum('dv', ${i})">${i}</button>`;
        }
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function toggleNum(type, n) {
        let set = (type === 'chuc') ? chucSet : dvSet;
        let id = (type === 'chuc') ? `c-${n}` : `d-${n}`;
        let btn = document.getElementById(id);
        
        if(set.has(n)) { set.delete(n); btn.classList.remove('active'); } 
        else { set.add(n); btn.classList.add('active'); }
        renderDan();
    }

    function selectQuick(type, mode) {
        for(let i=0; i<10; i++) {
            let shouldSelect = false;
            if(mode==='tai' && i>=5) shouldSelect = true;
            if(mode==='xiu' && i<5) shouldSelect = true;
            if(mode==='le' && i%2!==0) shouldSelect = true;
            if(mode==='chan' && i%2===0) shouldSelect = true;
            if(mode==='tatca') shouldSelect = true;

            let set = (type === 'chuc') ? chucSet : dvSet;
            let id = (type === 'chuc') ? `c-${i}` : `d-${i}`;
            let btn = document.getElementById(id);

            if(shouldSelect) { set.add(i); btn.classList.add('active'); }
        }
        renderDan();
    }

    function clearSet(type) {
        if(type==='chuc') { chucSet.clear(); document.querySelectorAll('#chuc-grid .btn-num').forEach(b=>b.classList.remove('active')); }
        else { dvSet.clear(); document.querySelectorAll('#dv-grid .btn-num').forEach(b=>b.classList.remove('active')); }
        renderDan();
    }

    function renderDan() {
        let res = [];
        let chucArr = Array.from(chucSet).sort((a,b) => a-b);
        let dvArr = Array.from(dvSet).sort((a,b) => a-b);
        chucArr.forEach(c => dvArr.forEach(d => res.push(c + "" + d)));
        document.getElementById('display-dan').innerHTML = res.length > 0 ? `<strong>Dàn (${res.length} số):</strong><br>${res.join(", ")}` : "Dàn số: (Chưa có số nào)";
    }

    function copyDan() {
        const div = document.getElementById('display-dan');
        const text = div.innerText;
        if(text.includes(":")) {
            const cleanText = text.split(":")[1].trim();
            navigator.clipboard.writeText(cleanText).then(() => alert("Đã sao chép dàn!"));
        }
    }

    function processXien() {
        const input = document.getElementById('inputNumbers').value;
        const size = parseInt(document.getElementById('xienType').value);
        let numbers = [...new Set(input.split(/[\s, \n]+/).filter(n => n.length > 0))];

        if (numbers.length < size) { alert(`Cần tối thiểu ${size} số để ghép!`); return; }

        let results = [];
        function combine(start, path) {
            if (path.length === size) { results.push(path.join("-")); return; }
            for (let i = start; i < numbers.length; i++) combine(i + 1, [...path, numbers[i]]);
        }
        combine(0, []);
        
        currentXienResult = results.join(", ");
        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('output').innerText = currentXienResult;
        document.getElementById('count').innerText = `Tổng cộng: ${results.length} cặp xiên ${size}`;
    }

    function copyXien() {
        if(currentXienResult) {
            navigator.clipboard.writeText(currentXienResult).then(() => alert("Đã sao chép xiên!"));
        }
    }

    window.onload = init;
</script>
</body>
                </html>
