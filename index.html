<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống XSMB Pro - Tự Động 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #121212; --card-bg: #1e1e1e;
            --primary: #ff4d4d; --secondary: #2ecc71;
            --text: #e0e0e0; --blue: #3498db;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; padding-bottom: 60px; }
        .container { max-width: 600px; margin: auto; }
        
        .tabs { display: flex; background: #000; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .tab-item { flex: 1; padding: 15px 5px; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; color: #888; }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .live-box {
            width: 100%;
            height: 600px; /* Giới hạn chiều cao vừa đủ */
            overflow: hidden;
            position: relative;
            background: #fff;
            border-radius: 8px;
            margin-top: 10px;
        }
        .live-box iframe {
            position: absolute;
            top: -80px; /* Căn chỉnh lại để khớp bảng KQ */
            left: 0;
            width: 100%;
            height: 2000px;
            border: none;
        }

        .grid-num { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; }
        .btn-num { background: #333; border: 1px solid #444; color: white; padding: 12px 0; border-radius: 5px; font-size: 16px; cursor: pointer; }
        .btn-num.active { background: var(--secondary); border-color: #fff; }
        
        #display-dan { background: #000; padding: 15px; margin: 10px; border-radius: 8px; color: #00ff00; word-break: break-all; min-height: 50px; border: 1px dashed #555; font-family: monospace; font-size: 14px; }
        .panel { display: none; padding: 10px; }
        .panel.active { display: block; }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="tabs">
            <div class="tab-item active" onclick="openTab(event, 'kq')">KẾT QUẢ</div>
            <div class="tab-item" onclick="openTab(event, 'ghep')">GHÉP SỐ</div>
            <div class="tab-item" onclick="openTab(event, 'xien')">XIÊN GHÉP</div>
        </div>

        <div id="kq" class="panel active">
            <div style="text-align: center; margin-bottom: 10px;">
                <span style="color: #2ecc71; font-size: 12px;">● Đã kết nối dữ liệu 2026...</span>
            </div>
            <div class="live-box">
                <iframe src="https://az24.vn/xsmb-30-ngay.html" scrolling="auto"></iframe>
            </div>
        </div>

        <div id="ghep" class="panel">
            <h4 style="margin: 5px 0;">ĐẦU (Hàng chục)</h4>
            <div class="grid-num" id="chuc-grid"></div>
            <div class="grid-num" style="grid-template-columns: repeat(3, 1fr); padding-top:0;">
                <button class="btn-num" style="background:#FF4500;" onclick="selectQuick('chuc', 'tatca')">Tất cả</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'tai')">Tài</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'xiu')">Xỉu</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'le')">Lẻ</button>
                <button class="btn-num" onclick="selectQuick('chuc', 'chan')">Chẵn</button>
                <button class="btn-num" style="background:#600;" onclick="clearSet('chuc', 'xoa')">Xóa</button>
            </div>

            <h4 style="margin: 5px 0;">ĐUÔI (Hàng đơn vị)</h4>
            <div class="grid-num" id="dv-grid"></div>
            <div class="grid-num" style="grid-template-columns: repeat(3, 1fr); padding-top:0;">
                <button class="btn-num" style="background:#FF4500;" onclick="selectQuick('dv', 'tatca')">Tất cả</button>
                <button class="btn-num" onclick="selectQuick('dv', 'tai')">Tài</button>
                <button class="btn-num" onclick="selectQuick('dv', 'xiu')">Xỉu</button>
                <button class="btn-num" onclick="selectQuick('dv', 'le')">Lẻ</button>
                <button class="btn-num" onclick="selectQuick('dv', 'chan')">Chẵn</button>
                <button class="btn-num" style="background:#600;" onclick="clearSet('dv', 'xoa')">Xóa</button>
            </div>

            <div id="display-dan">Dàn số: </div>
            <button onclick="copyToClipboard()" style="width: 100%; padding: 15px; background:var(--blue); border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px;">SAO CHÉP DÀN</button>
        </div>

        <div id="xien" class="panel">
            <h3 style="text-align: center;">Tính năng Xiên Ghép đang cập nhật...</h3>
        </div>
    </div>

<script>
    let chucSet = new Set(), dvSet = new Set();

    function initButtons() {
        const cGrid = document.getElementById('chuc-grid');
        const dGrid = document.getElementById('dv-grid');
        cGrid.innerHTML = ''; dGrid.innerHTML = ''; // Clear trước khi tạo
        for(let i=0; i<10; i++) {
            cGrid.innerHTML += `<button class="btn-num" id="c-${i}" onclick="toggleNum('chuc', ${i})">${i}</button>`;
            dGrid.innerHTML += `<button class="btn-num" id="d-${i}" onclick="toggleNum('dv', ${i})">${i}</button>`;
        }
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        const target = document.getElementById(tabName);
        if(target) target.classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function toggleNum(type, n) {
        let set = (type === 'chuc') ? chucSet : dvSet;
        let id = (type === 'chuc') ? `c-${n}` : `d-${n}`;
        const btn = document.getElementById(id);
        
        if(set.has(n)) {
            set.delete(n);
            btn.classList.remove('active');
        } else {
            set.add(n);
            btn.classList.add('active');
        }
        renderDan();
    }

    function selectQuick(type, mode) {
        clearSet(type);
        for(let i=0; i<10; i++) {
            if(mode==='tai' && i>=5) toggleNum(type, i);
            else if(mode==='xiu' && i<5) toggleNum(type, i);
            else if(mode==='le' && i%2!==0) toggleNum(type, i);
            else if(mode==='chan' && i%2===0) toggleNum(type, i);
            else if(mode==='tatca') toggleNum(type, i);
        }
    }

    function clearSet(type) {
        if(type==='chuc') { 
            chucSet.clear(); 
            document.querySelectorAll('#chuc-grid .btn-num').forEach(b=>b.classList.remove('active')); 
        } else { 
            dvSet.clear(); 
            document.querySelectorAll('#dv-grid .btn-num').forEach(b=>b.classList.remove('active')); 
        }
        renderDan();
    }

    function renderDan() {
        let res = [];
        let chucArr = Array.from(chucSet).sort((a,b) => a-b);
        let dvArr = Array.from(dvSet).sort((a,b) => a-b);
        
        chucArr.forEach(c => {
            dvArr.forEach(d => res.push(c + "" + d));
        });
        document.getElementById('display-dan').innerText = "Dàn (" + res.length + " số): " + res.join(", ");
    }

    function copyToClipboard() {
        const text = document.getElementById('display-dan').innerText;
        if(text.includes(": ")) {
            const cleanText = text.split(": ")[1];
            navigator.clipboard.writeText(cleanText).then(() => alert("Đã sao chép dàn số!"));
        }
    }

    window.onload = initButtons;
</script>
</body>
</html>
