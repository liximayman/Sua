<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện Xổ Số</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background-color: white;
            border: 1px solid #ccc;
        }

        /* Phần bảng kết quả bên trên */
        .result-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .result-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        .bg-light-blue { background-color: #e3f2fd; }
        .bg-blue { background-color: #90caf9; font-weight: bold; }
        .special { font-weight: bold; font-size: 18px; }
        .highlight-blue { color: #1976d2; }

        /* Thanh tiêu đề Kết quả gần đây */
        .header-bar {
            background-color: #333;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Tab menu 2D, 3D, 4D */
        .tab-menu {
            background-color: #1a1a1a;
            display: flex;
            padding: 10px;
            gap: 20px;
            color: #bbb;
            font-weight: bold;
        }

        .tab-menu .active {
            color: #4caf50;
            border-bottom: 2px solid #4caf50;
        }

        /* Bảng chọn số (Chục / Đơn vị) */
        .bet-section {
            background-color: #2c2c2c;
            padding: 10px;
        }

        .selector-row {
            display: flex;
            margin-bottom: 10px;
            border: 1px solid #444;
        }

        .label-cell {
            background-color: #444;
            color: white;
            width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-size: 12px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            flex-grow: 1;
        }

        .grid-item {
            background-color: #555;
            color: white;
            border: 0.5px solid #333;
            padding: 12px 0;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .grid-item.action {
            background-color: #3d3d3d;
            font-size: 13px;
            color: #ddd;
        }

        .grid-item:active {
            background-color: #4caf50;
        }

        .dropdown-bar {
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 8px;
            border-bottom: 1px solid #333;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <table class="result-table">
        <tr class="bg-light-blue">
            <td>Đặc Biệt</td>
            <td class="special">775<span class="highlight-blue">44</span></td>
            <td class="bg-blue">Đầu</td>
            <td class="bg-blue">Đuôi</td>
        </tr>
        <tr>
            <td>Nhất</td>
            <td>01588</td>
            <td class="bg-blue">0</td>
            <td>3,4,7</td>
        </tr>
        <tr>
            <td>Nhì</td>
            <td>72768 - 51488</td>
            <td class="bg-blue">1</td>
            <td>4,0,7</td>
        </tr>
        <tr>
            <td>Ba</td>
            <td>34503 - 00614 - 35374<br>49675 - 70691 - 32192</td>
            <td class="bg-blue">2</td>
            <td>7,7</td>
        </tr>
    </table>

    <div class="header-bar">Kết quả gần đây</div>
    
    <div class="tab-menu">
        <span class="active">2D</span>
        <span>3D</span>
        <span>4D</span>
        <span>Tổng hợp</span>
    </div>

    <div class="dropdown-bar">
        2D - Đề đuôi ▾
    </div>

    <div class="bet-section">
        <div class="selector-row">
            <div class="label-cell">Chục</div>
            <div class="grid-container">
                <div class="grid-item">0</div>
                <div class="grid-item">1</div>
                <div class="grid-item">2</div>
                <div class="grid-item">3</div>
                <div class="grid-item">4</div>
                <div class="grid-item">5</div>
                <div class="grid-item">6</div>
                <div class="grid-item">7</div>
                <div class="grid-item">8</div>
                <div class="grid-item">9</div>
                <div class="grid-item action">Tài</div>
                <div class="grid-item action">Xỉu</div>
                <div class="grid-item action">Lẻ</div>
                <div class="grid-item action">Chẵn</div>
                <div class="grid-item action">Xóa</div>
            </div>
        </div>

        <div class="selector-row">
            <div class="label-cell">Đơn vị</div>
            <div class="grid-container">
                <div class="grid-item">0</div>
                <div class="grid-item">1</div>
                <div class="grid-item">2</div>
                <div class="grid-item">3</div>
                <div class="grid-item">4</div>
                <div class="grid-item">5</div>
                <div class="grid-item">6</div>
                <div class="grid-item">7</div>
                <div class="grid-item">8</div>
                <div class="grid-item">9</div>
                <div class="grid-item action">Tài</div>
                <div class="grid-item action">Xỉu</div>
                <div class="grid-item action">Lẻ</div>
                <div class="grid-item action">Chẵn</div>
                <div class="grid-item action">Xóa</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
