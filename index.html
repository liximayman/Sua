<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSMB Pro - Phím Chạm Thông Minh</title>
    <style>
        :root {
            --bg-dark: #121212; --card-bg: #1e1e1e;
            --primary: #ff4d4d; --secondary: #2ecc71;
            --text: #e0e0e0; --blue: #3498db;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        
        /* Iframe kết quả */
        .live-box { width: 100%; height: 60vh; overflow: hidden; border-radius: 8px; border: 2px solid #333; background: #fff; margin-bottom: 10px; }
        .live-box iframe { width: 100%; height: 1500px; border: none; margin-top: -80px; }

        /* Hiển thị dàn số */
        #display-dan { background: #000; padding: 15px; border-radius: 8px; color: #00ff00; word-break: break-all; min-height: 40px; border: 1px dashed #555; font-family: monospace; font-size: 16px; margin-bottom: 10px; }

        /* PHÍM CHẠM (FAB) */
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; z-index: 999; font-size: 24px; border: 2px solid #fff; }

        /* BẢNG CHỌN SỐ (MODAL) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: var(--card-bg); width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; border: 1px solid #444; }
        
        .grid-num { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-num { background: #333; border: 1px solid #555; color: white; padding: 12px 0; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .btn-num.active { background: var(--secondary); border-color: #fff; }
        
        .modal-title { color: var(--primary); margin: 10px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-close { width: 100%; padding: 12px; background: var(--blue); border: none; color: white; font-weight: bold; border-radius: 8px; margin-top: 10px; cursor: pointer; }
        
        .btn-action { background: #444; color: #fff; border: none; padding: 5px; border-radius: 4px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <div class="live-box">
            <iframe src="https://az24.vn/xsmb-30-ngay.html"></iframe>
        </div>

        <div id="display-dan">Chạm nút đỏ để ghép dàn...</div>
        <button class="btn-close" style="background: var(--blue);" onclick="copyToClipboard()">SAO CHÉP DÀN SỐ</button>
    </div>

    <div class="fab" onclick="toggleModal()">+</div>

    <div class="overlay" id="modalOverlay">
        <div class="modal">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin:0; color: #fff;">Bộ Ghép Số</h3>
                <span style="color: #888; cursor: pointer;" onclick="toggleModal()">[Đóng]</span>
            </div>

            <div class="modal-title">Hàng Chục (Đầu)</div>
            <div class="grid-num" id="chuc-grid"></div>
            
            <div class="modal-title">Hàng Đơn Vị (Đuôi)</div>
            <div class="grid-num" id="dv-grid"></div>

            <button class="btn-close" onclick="toggleModal()">XÁC NHẬN</button>
            <button class="btn-close" style="background: #c0392b; margin-top: 5px;" onclick="clearAll()">XÓA HẾT</button>
        </div>
    </div>

<script>
    let chucSet = new Set(), dvSet = new Set();

    function init() {
        const cGrid = document.getElementById('chuc-grid');
        const dGrid = document.getElementById('dv-grid');
        for(let i=0; i<10; i++) {
            cGrid.innerHTML += `<button class="btn-num" id="c-${i}" onclick="toggleNum('chuc', ${i})">${i}</button>`;
            dGrid.innerHTML += `<button class="btn-num" id="d-${i}" onclick="toggleNum('dv', ${i})">${i}</button>`;
        }
    }

    function toggleModal() {
        const overlay = document.getElementById('modalOverlay');
        overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
    }

    function toggleNum(type, n) {
        let set = (type === 'chuc') ? chucSet : dvSet;
        let id = (type === 'chuc') ? `c-${n}` : `d-${n}`;
        if(set.has(n)) set.delete(n); else set.add(n);
        document.getElementById(id).classList.toggle('active');
        renderDan();
    }

    function renderDan() {
        let res = [];
        let chucArr = Array.from(chucSet).sort();
        let dvArr = Array.from(dvSet).sort();
        chucArr.forEach(c => dvArr.forEach(d => res.push(c + "" + d)));
        const display = document.getElementById('display-dan');
        display.innerText = res.length > 0 ? "Dàn (" + res.length + " số): " + res.join(", ") : "Chạm nút đỏ để ghép dàn...";
    }

    function clearAll() {
        chucSet.clear(); dvSet.clear();
        document.querySelectorAll('.btn-num').forEach(b => b.classList.remove('active'));
        renderDan();
    }

    function copyToClipboard() {
        const text = document.getElementById('display-dan').innerText;
        if (text.includes("Chạm nút")) return alert("Chưa có số để sao chép!");
        const cleanText = text.split(": ")[1];
        navigator.clipboard.writeText(cleanText).then(() => alert("Đã copy dàn số!"));
    }

    window.onload = init;
</script>
</body>
</html>
