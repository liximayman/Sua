<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống XSMB Pro - Tự Động 2026</title>
    <style>
        :root {
            --bg-dark: #121212; --card-bg: #1e1e1e;
            --primary: #ff4d4d; --secondary: #2ecc71;
            --text: #e0e0e0; --blue: #3498db;
            --border-gray: #444;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; padding-bottom: 60px; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        .tabs { display: flex; background: #000; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .tab-item { flex: 1; padding: 15px 2px; text-align: center; cursor: pointer; font-size: 14px; font-weight: bold; color: #888; }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        
        .live-box { width: 100%; height: 400px; overflow-y: auto; overflow-x: hidden; position: relative; background: #fff; border-radius: 2px; margin-bottom: 15px; border: 1px solid #333; }
        .live-box iframe { width: 100%; height: 1500px; border: none; margin-top: -80px; }

        /* Style mới theo hình ảnh của bạn */
        .selector-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; table-layout: fixed; }
        .selector-table td { width: 2px; border: 1px solid var(--border-gray); padding: 0; position: relative; }
        .label-cell { background: #1a1a1a; width: 60px; text-align: center; font-size: 14px; color: #fff; border-right: 2px solid #333 !important; }
        
        .btn-num { 
            width: 100%; height: 20px; background: #333; border: none; color: white; 
            font-size: 18px; font-weight: bold; cursor: pointer; display: block; 
        }
        .btn-quick { 
            width: 100%; height: 20px; background: #222; border: none; color: #fff; 
            font-size: 13px; font-weight: bold; cursor: pointer; 
        }
        .btn-num.active { background: var(--secondary); color: #fff; }
        .btn-xoa { color: #ff4d4d; }

        #display-dan, .result-box { background: #000; padding: 10px; margin: 10px 0; border-radius: 2px; color: #00ff00; word-break: break-all; min-height: 50px; border: 1px dashed #555; font-family: monospace; font-size: 15px; line-height: 1.4; }
        .panel { display: none; }
        .panel.active { display: block; animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .field-group { margin-bottom: 15px; }
        .field-group label { display: block; margin-bottom: 5px; font-size: 15px; color: #bbb; font-weight: bold; }
        textarea, select { width: 100%; background: #252525; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        .btn-main { width: 100%; padding: 15px; background: var(--blue); border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .stats { font-size: 13px; color: var(--secondary); margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab-item active" onclick="openTab(event, 'main-panel')">KẾT QUẢ & SỐ GHÉP</div>
        <div class="tab-item" onclick="openTab(event, 'xien-panel')">XIÊN GHÉP</div>
    </div>

        <div class="container">
        <div id="main-panel" class="panel active">
            <div class="live-box">
                <iframe src="https://az24.vn/xsmb-30-ngay.html"></iframe>
            </div>

            <div class="field-group" style="margin-top: 5px;">
                <textarea id="exclude-khan" rows="1" placeholder="Nhập cạp số cần loại bỏ..." oninput="renderDan()"></textarea>
            </div>

            <table class="selector-table">
                <tr>
                    <td rowspan="3" class="label-cell">Chục</td>
                    <td><button class="btn-num" id="c-0" onclick="toggleNum('chuc', 0)">0</button></td>
                    <td><button class="btn-num" id="c-1" onclick="toggleNum('chuc', 1)">1</button></td>
                    <td><button class="btn-num" id="c-2" onclick="toggleNum('chuc', 2)">2</button></td>
                    <td><button class="btn-num" id="c-3" onclick="toggleNum('chuc', 3)">3</button></td>
                    <td><button class="btn-num" id="c-4" onclick="toggleNum('chuc', 4)">4</button></td>
                </tr>
                <tr>
                    <td><button class="btn-num" id="c-5" onclick="toggleNum('chuc', 5)">5</button></td>
                    <td><button class="btn-num" id="c-6" onclick="toggleNum('chuc', 6)">6</button></td>
                    <td><button class="btn-num" id="c-7" onclick="toggleNum('chuc', 7)">7</button></td>
                    <td><button class="btn-num" id="c-8" onclick="toggleNum('chuc', 8)">8</button></td>
                    <td><button class="btn-num" id="c-9" onclick="toggleNum('chuc', 9)">9</button></td>
                </tr>
                <tr>
                    <td><button class="btn-quick" onclick="selectQuick('chuc', 'tai')">Tài</button></td>
                    <td><button class="btn-quick" onclick="selectQuick('chuc', 'xiu')">Xỉu</button></td>
                    <td><button class="btn-quick" onclick="selectQuick('chuc', 'le')">Lẻ</button></td>
                    <td><button class="btn-quick" onclick="selectQuick('chuc', 'chan')">Chẵn</button></td>
                    <td><button class="btn-quick btn-xoa" onclick="clearSet('chuc')">Xóa</button></td>
                </tr>
            </table>

            <table class="selector-table">
                <tr>
                    <td rowspan="3" class="label-cell">Đơn vị</td>
                    <td><button class="btn-num" id="d-0" onclick="toggleNum('dv', 0)">0</button></td>
                    <td><button class="btn-num" id="d-1" onclick="toggleNum('dv', 1)">1</button></td>
                    <td><button class="btn-num" id="d-2" onclick="toggleNum('dv', 2)">2</button></td>
                    <td><button class="btn-num" id="d-3" onclick="toggleNum('dv', 3)">3</button></td>
                    <td><button class="btn-num" id="d-4" onclick="toggleNum('dv', 4)">4</button></td>
                </tr>
                <tr>
                    <td><button class="btn-num" id="d-5" onclick="toggleNum('dv', 5)">5</button></td>
                    <td><button class="btn-num" id="d-6" onclick="toggleNum('dv', 6)">6</button></td>
                    <td><button class="btn-num" id="d-7" onclick="toggleNum('dv', 7)">7</button></td>
                    <td><button class="btn-num" id="d-8" onclick="toggleNum('dv', 8)">8</button></td>
                    <td><button class="btn-num" id="d-9" onclick="toggleNum('dv', 9)">9</button></td>
                </tr>
                <tr>
                    <td><button class="btn-quick" onclick="selectQuick('dv', 'tai')">Tài</button></td>
                    <td><button class="btn-quick" onclick="selectQuick('dv', 'xiu')">Xỉu</button></td>
                    <td><button class="btn-quick" onclick="selectQuick('dv', 'le')">Lẻ</button></td>
                    <td><button class="btn-quick" onclick="selectQuick('dv', 'chan')">Chẵn</button></td>
                    <td><button class="btn-quick btn-xoa" onclick="clearSet('dv')">Xóa</button></td>
                </tr>
            </table>
            
            <div id="display-dan">Dàn số: (Trống)</div>
            <button id="copyDanBtn" class="btn-main" onclick="copyToClipboard()">SAO CHÉP DÀN</button>
        </div> 
            
<div id="xien-panel" class="panel">
            <h2 style="color: var(--secondary); font-size: 18px;">Ghép Xiên Thông Minh</h2>
            <div class="field-group">
                <label>Nhập dãy số:</label>
                <textarea id="inputNumbers" rows="3" placeholder="Ví dụ: 01 02 03 04 05" oninput="processXien()"></textarea>
            </div>
            <div class="field-group">
                <label>Loại xiên:</label>
                <select id="xienType" onchange="processXien()">
                    <option value="2">Xiên 2</option>
                    <option value="3">Xiên 3</option>
                    <option value="4">Xiên 4</option>
                </select>
            </div>
            <div class="field-group">
                <label>Số loại bỏ (nhập số không thích của bạn ở đây...):</label>
                <textarea id="excludeNumbers" rows="1" placeholder="Ví dụ: 13 49" oninput="processXien()"></textarea>
            </div>
            <div id="resultContainer" style="display:none;">
                <div id="count" class="stats"></div>
                <div id="output" class="result-box"></div>
                <button id="copyXienBtn" class="btn-main" style="background: var(--blue);" onclick="copyXien()">SAO CHÉP KẾT QUẢ</button>
            </div>
        </div>
    </div>

<script>
    let chucSet = new Set(), dvSet = new Set();
    let currentXienResult = "";

    function openTab(evt, tabName) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        if (evt) evt.currentTarget.classList.add('active');
    }

    function toggleNum(type, n) {
        let set = (type === 'chuc') ? chucSet : dvSet;
        let id = (type === 'chuc') ? `c-${n}` : `d-${n}`;
        if(set.has(n)) set.delete(n); else set.add(n);
        document.getElementById(id).classList.toggle('active');
        renderDan();
    }

    function renderDan() {
    let res = [];
    let chucArr = Array.from(chucSet).sort((a, b) => a - b);
    let dvArr = Array.from(dvSet).sort((a, b) => a - b);
    
    // Lấy danh sách số khan người dùng nhập
    const khanInput = document.getElementById('exclude-khan').value;
    const khanList = khanInput.split(/[\s, \n, .]+/).filter(n => n.length > 0);

    // Vòng lặp ghép số
    chucArr.forEach(c => {
        dvArr.forEach(d => {
            let num = c + "" + d;
            // Chỉ thêm vào dàn nếu số đó KHÔNG nằm trong danh sách số khan
            if (!khanList.includes(num)) {
                res.push(num);
            }
        });
    });

    const display = document.getElementById('display-dan');
    if (res.length > 0) {
        display.innerText = "Dàn (" + res.length + " số): " + res.join(", ");
    } else {
        display.innerText = "Dàn số: (Trống hoặc đã bị loại hết)";
    }
}

    function selectQuick(type, mode) {
        // Tắt hết các nút hiện tại trong hàng đó trước khi chọn nhanh
        const prefix = (type === 'chuc') ? 'c-' : 'd-';
        const set = (type === 'chuc') ? chucSet : dvSet;
        
        set.clear();
        for(let i=0; i<10; i++) {
            document.getElementById(prefix + i).classList.remove('active');
        }

        for(let i=0; i<10; i++) {
            if((mode==='tai' && i>=5) || (mode==='xiu' && i<5) || (mode==='le' && i%2!==0) || (mode==='chan' && i%2===0)) {
                toggleNum(type, i);
            }
        }
    }

    function clearSet(type) {
        if(type==='chuc') { 
            chucSet.clear(); 
            for(let i=0; i<10; i++) document.getElementById('c-'+i).classList.remove('active');
        } else { 
            dvSet.clear(); 
            for(let i=0; i<10; i++) document.getElementById('d-'+i).classList.remove('active');
        }
        renderDan();
    }

    function copyToClipboard() {
        const displayText = document.getElementById('display-dan').innerText;
        if (displayText.includes("(Trống)")) return alert("Chưa có số!");
        const cleanText = displayText.split(": ")[1];
        navigator.clipboard.writeText(cleanText).then(() => {
            const btn = document.getElementById('copyDanBtn');
            btn.innerText = "COPIED ✓";
            btn.style.background = "#2ecc71";
            setTimeout(() => { btn.innerText = "SAO CHÉP DÀN"; btn.style.background = "#3498db"; }, 1500);
        });
    }

    // Logic Xiên ghép
    function processXien() {
        const input = document.getElementById('inputNumbers').value;
        const exclude = document.getElementById('excludeNumbers').value;
        const size = parseInt(document.getElementById('xienType').value);
        let numbers = [...new Set(input.split(/[\s, \n, .]+/).filter(n => n.length > 0))];
        let excludeList = exclude.split(/[\s, \n, .]+/).filter(n => n.length > 0);
        numbers = numbers.filter(n => !excludeList.includes(n));
        const container = document.getElementById('resultContainer');
        if (numbers.length < size) { container.style.display = 'none'; return; }
        let results = [];
        function combine(start, path) {
            if (path.length === size) { results.push(path.join("-")); return; }
            for (let i = start; i < numbers.length; i++) combine(i + 1, [...path, numbers[i]]);
        }
        combine(0, []);
        currentXienResult = results.join("\n");
        container.style.display = 'block';
        document.getElementById('output').innerText = results.join(", ");
        document.getElementById('count').innerText = `✓ Đã ghép thành công: ${results.length} cặp xiên ${size}`;
    }

    function copyXien() {
        navigator.clipboard.writeText(currentXienResult).then(() => {
            const btn = document.getElementById('copyXienBtn');
            btn.innerText = "COPIED ✓"; btn.style.background = "#2ecc71";
            setTimeout(() => { btn.innerText = "SAO CHÉP KẾT QUẢ"; btn.style.background = "#3498db"; }, 1500);
        });
    }
</script>
</body>
</html>
