<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống XSMB Pro 2026</title>
    <style>
        :root {
            --bg-dark: #0f0f0f; 
            --card-bg: #1e1e1e;
            --primary: #ff4d4d; 
            --secondary: #2ecc71;
            --text: #e0e0e0; 
            --blue: #3498db;
            --gray: #333;
        }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 20px;
            overflow-x: hidden;
            touch-action: pan-y; /* Quan trọng: Cho phép cuộn dọc nhưng quản lý vuốt ngang */
        }
        .container { max-width: 500px; margin: auto; position: relative; min-height: 100vh; }
        
        .tabs { 
            display: flex; 
            background: #000; 
            border-bottom: 1px solid #333; 
            position: sticky; 
            top: 0; 
            z-index: 999; 
        }
        .tab-item { 
            flex: 1; 
            padding: 15px 5px; 
            text-align: center; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: bold; 
            color: #777; 
            text-transform: uppercase;
            transition: 0.2s;
        }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #111; }

        .panel { display: none; padding-bottom: 20px; }
        .panel.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .live-container { padding: 5px; background: #000; }
        .live-box {
            width: 100%;
            height: 45vh; 
            overflow: hidden;
            border-radius: 6px;
            border: 1px solid var(--gray);
            position: relative;
        }
        .live-box iframe { width: 100%; height: 1000px; border: none; }

        #display-dan { 
            background: #050505; padding: 12px; margin: 10px; border-radius: 6px; 
            color: #00ff00; word-break: break-all; min-height: 40px; 
            border: 1px dashed #444; font-family: monospace; font-size: 12px;
        }

        .grid-num { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 10px; }
        .btn-num { 
            background: #222; border: 1px solid #444; color: white; 
            padding: 12px 0; border-radius: 5px; font-size: 16px; font-weight: bold;
        }
        .btn-num.active { background: var(--secondary); color: #000; border-color: #fff; }

        .quick-group { display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px; padding: 0 10px; }
        .btn-q { background: #333; border: none; color: #ccc; padding: 8px 0; border-radius: 4px; font-size: 10px; font-weight: bold; }

        .btn-copy-main { 
            width: calc(100% - 20px); padding: 15px; background: var(--blue); 
            border: none; color: white; font-weight: bold; border-radius: 6px; 
            margin: 15px 10px; font-size: 16px;
        }

        textarea, select { 
            width: calc(100% - 20px); background: #111; color: #fff; 
            border: 1px solid #444; padding: 12px; border-radius: 6px; 
            margin: 10px; box-sizing: border-box;
        }
        .result-box { background: #000; padding: 15px; color: #2ecc71; margin: 10px; border-radius: 6px; border: 1px solid #333; font-family: monospace; }
    </style>
</head>
<body id="swipe-area">
    
    <div class="container">
        <div class="tabs">
            <div class="tab-item active" onclick="openTab(0, 'main-tool')">KẾT QUẢ & GHÉP</div>
            <div class="tab-item" onclick="openTab(1, 'xien')">XIÊN GHÉP</div>
        </div>

        <div id="main-tool" class="panel active">
            <div class="live-container">
                <div class="live-box">
                    <iframe src="https://az24.vn/xsmb-30-ngay.html"></iframe>
                </div>
            </div>
            
            <div id="display-dan">Dàn số: (Chưa chọn)</div>

            <h4 style="margin-left:12px; color:var(--blue)">HÀNG CHỤC</h4>
            <div class="grid-num" id="chuc-grid"></div>
            <div class="quick-group">
                <button class="btn-q" onclick="selectQuick('chuc', 'chan')">CHẴN</button>
                <button class="btn-q" onclick="selectQuick('chuc', 'le')">LẺ</button>
                <button class="btn-q" style="background:#d35400" onclick="selectQuick('chuc', 'tatca')">ALL</button>
                <button class="btn-q" onclick="selectQuick('chuc', 'tai')">TÀI</button>
                <button class="btn-q" onclick="selectQuick('chuc', 'xiu')">XỈU</button>
                <button class="btn-q" style="background:#c0392b" onclick="clearSet('chuc')">XÓA</button>
            </div>

            <h4 style="margin-left:12px; color:var(--blue)">HÀNG ĐƠN VỊ</h4>
            <div class="grid-num" id="dv-grid"></div>
            <div class="quick-group">
                <button class="btn-q" onclick="selectQuick('dv', 'chan')">CHẴN</button>
                <button class="btn-q" onclick="selectQuick('dv', 'le')">LẺ</button>
                <button class="btn-q" style="background:#d35400" onclick="selectQuick('dv', 'tatca')">ALL</button>
                <button class="btn-q" onclick="selectQuick('dv', 'tai')">TÀI</button>
                <button class="btn-q" onclick="selectQuick('dv', 'xiu')">XỈU</button>
                <button class="btn-q" style="background:#c0392b" onclick="clearSet('dv')">XÓA</button>
            </div>

            <button onclick="copyDan()" class="btn-copy-main">SAO CHÉP DÀN</button>
        </div>

        <div id="xien" class="panel">
            <h3 style="text-align:center; color:var(--secondary)">XIÊN GHÉP TỰ ĐỘNG</h3>
            <textarea id="inputNumbers" rows="4" placeholder="Nhập số cách nhau khoảng trắng..."></textarea>
            <select id="xienType">
                <option value="2">Xiên 2</option>
                <option value="3">Xiên 3</option>
                <option value="4">Xiên 4</option>
            </select>
            <button onclick="processXien()" class="btn-copy-main" style="background:var(--secondary)">GHÉP XIÊN</button>
            <div id="resultContainer" style="display:none">
                <div id="output" class="result-box"></div>
                <button onclick="copyXien()" class="btn-copy-main" style="background:#555">SAO CHÉP KẾT QUẢ</button>
            </div>
        </div>
    </div>

<script>
    let chucSet = new Set(), dvSet = new Set();
    let currentTabIndex = 0;
    let touchstartX = 0;
    let touchendX = 0;

    function init() {
        const cG = document.getElementById('chuc-grid');
        const dG = document.getElementById('dv-grid');
        for(let i=0; i<10; i++) {
            cG.innerHTML += `<button class="btn-num" id="c-${i}" onclick="toggleNum('chuc', ${i})">${i}</button>`;
            dG.innerHTML += `<button class="btn-num" id="d-${i}" onclick="toggleNum('dv', ${i})">${i}</button>`;
        }
        
        // Cấu hình vuốt
        const area = document.getElementById('swipe-area');
        area.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
        area.addEventListener('touchend', e => { 
            touchendX = e.changedTouches[0].screenX; 
            handleSwipe(); 
        }, {passive: true});
    }

    function handleSwipe() {
        let diff = touchstartX - touchendX;
        if (Math.abs(diff) < 100) return; // Ngưỡng vuốt (pixel)

        if (diff > 0 && currentTabIndex === 0) { // Vuốt sang trái -> Tab 2
            openTab(1, 'xien');
        } else if (diff < 0 && currentTabIndex === 1) { // Vuốt sang phải -> Tab 1
            openTab(0, 'main-tool');
        }
    }

    function openTab(idx, name) {
        currentTabIndex = idx;
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        document.querySelectorAll('.tab-item')[idx].classList.add('active');
        window.scrollTo(0,0);
    }

    function toggleNum(type, n) {
        let s = (type==='chuc') ? chucSet : dvSet;
        let id = (type==='chuc') ? `c-${n}` : `d-${n}`;
        if(s.has(n)) { s.delete(n); document.getElementById(id).classList.remove('active'); }
        else { s.add(n); document.getElementById(id).classList.add('active'); }
        render();
    }

    function render() {
        let res = [];
        Array.from(chucSet).sort().forEach(c => {
            Array.from(dvSet).sort().forEach(d => res.push(c+""+d));
        });
        document.getElementById('display-dan').innerText = res.length > 0 ? "Dàn ("+res.length+" số): " + res.join(", ") : "Dàn số: (Chưa chọn)";
    }

    function selectQuick(type, mode) {
        clearSet(type);
        for(let i=0; i<10; i++) {
            if((mode==='tai' && i>=5)||(mode==='xiu' && i<5)||(mode==='le' && i%2!==0)||(mode==='chan' && i%2===0)||(mode==='tatca')) toggleNum(type, i);
        }
    }

    function clearSet(type) {
        if(type==='chuc') { chucSet.clear(); document.querySelectorAll('#chuc-grid .btn-num').forEach(b=>b.classList.remove('active')); }
        else { dvSet.clear(); document.querySelectorAll('#dv-grid .btn-num').forEach(b=>b.classList.remove('active')); }
        render();
    }

    function copyDan() {
        let t = document.getElementById('display-dan').innerText;
        if(t.includes(": ")) { navigator.clipboard.writeText(t.split(": ")[1]).then(()=>alert("Đã chép!")); }
    }

    function processXien() {
        let input = document.getElementById('inputNumbers').value;
        let size = parseInt(document.getElementById('xienType').value);
        let nums = [...new Set(input.split(/[\s,]+/).filter(n => n.length > 0))];
        if(nums.length < size) return alert("Không đủ số!");
        
        let res = [];
        function combine(s, p) {
            if(p.length === size) { res.push(p.join("-")); return; }
            for(let i=s; i<nums.length; i++) combine(i+1, [...p, nums[i]]);
        }
        combine(0, []);
        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('output').innerText = res.join(", ");
    }
    
    function copyXien() {
        navigator.clipboard.writeText(document.getElementById('output').innerText).then(()=>alert("Đã chép xiên!"));
    }

    window.onload = init;
</script>
</body>
</html>
