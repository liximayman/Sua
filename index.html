<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống XSMB Pro 2026</title>
    <style>
        :root {
            --bg-dark: #0f0f0f; 
            --card-bg: #1e1e1e;
            --primary: #ff4d4d; 
            --secondary: #2ecc71;
            --text: #e0e0e0; 
            --blue: #3498db;
            --gray: #333;
        }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-dark); 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 15px;
            overflow-x: hidden;
            /* Ngăn chặn hành vi kéo để làm mới của trình duyệt trên Android để vuốt mượt hơn */
            overscroll-behavior-y: contain;
        }
        .container { max-width: 500px; margin: auto; position: relative; }
        
        .tabs { 
            display: flex; 
            background: #000; 
            border-bottom: 1px solid #333; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .tab-item { 
            flex: 1; 
            padding: 12px 2px; 
            text-align: center; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: bold; 
            color: #888; 
            text-transform: uppercase;
            transition: 0.3s;
        }
        .tab-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #1a1a1a; }

        /* KHU VỰC LIVE BOX */
        .live-container { padding: 5px; background: #000; }
        .live-box {
            width: 100%;
            height: 50vh; 
            overflow-y: auto; 
            overflow-x: hidden;
            position: relative;
            background: #fff;
            border-radius: 6px;
            border: 1px solid var(--gray);
            -webkit-overflow-scrolling: touch;
        }
        .live-box iframe { width: 100%; height: 1500px; border: none; display: block; }

        #display-dan { 
            background: #050505; 
            padding: 12px; 
            margin: 10px; 
            border-radius: 6px; 
            color: #00ff00; 
            word-break: break-all; 
            min-height: 40px; 
            border: 1px dashed #444; 
            font-family: 'Courier New', monospace; 
            font-size: 13px; 
            line-height: 1.4;
        }

        .grid-num { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 8px; }
        .btn-num { 
            background: #262626; border: 1px solid #444; color: white; 
            padding: 10px 0; border-radius: 4px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        .btn-num:active { transform: scale(0.9); }
        .btn-num.active { background: var(--secondary); border-color: #fff; color: #000; }
        
        /* Hiệu ứng chuyển Panel mượt */
        .panel { display: none; animation: slideIn 0.3s ease-out; }
        .panel.active { display: block; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h4 { margin: 15px 0 5px 10px; color: var(--blue); font-size: 14px; text-transform: uppercase; }
        .btn-copy-main { 
            width: calc(100% - 24px); padding: 14px; background: var(--blue); 
            border: none; color: white; font-weight: bold; border-radius: 6px; 
            cursor: pointer; margin: 12px; font-size: 15px;
        }

        textarea, select { 
            width: calc(100% - 20px); background: #1a1a1a; color: #fff; 
            border: 1px solid #444; padding: 10px; border-radius: 6px; 
            margin: 5px 10px; box-sizing: border-box; font-size: 14px;
        }
        .result-box { 
            background: #000; padding: 10px; color: #2ecc71; 
            margin: 10px; border-radius: 6px; border: 1px solid #333; 
            min-height: 40px; font-family: monospace;
        }
    </style>
</head>
<body>
    
    <div class="container" id="main-container">
        <div class="tabs">
            <div class="tab-item active" id="tab-1" onclick="openTab(0, 'main-tool')">KẾT QUẢ & GHÉP SỐ</div>
            <div class="tab-item" id="tab-2" onclick="openTab(1, 'xien')">XIÊN GHÉP</div>
        </div>

        <div id="main-tool" class="panel active">
            <div style="text-align: center; margin-top: 8px;">
                <span style="color: #2ecc71; font-size: 10px; font-weight: bold;">● DỮ LIỆU TRỰC TUYẾN 2026</span>
            </div>
            
            <div class="live-container">
                <div class="live-box">
                    <iframe src="https://az24.vn/xsmb-30-ngay.html"></iframe>
                </div>
                <div id="display-dan">Dàn số: (Chưa chọn)</div>
            </div>

            <h4>1. CHỌN ĐẦU (Hàng chục)</h4>
            <div class="grid-num" id="chuc-grid"></div>
            <div class="grid-num" style="grid-template-columns: repeat(6, 1fr); padding-top:0;">
                <button class="btn-num" style="font-size:11px;" onclick="selectQuick('chuc', 'chan')">CHẴN</button>
                <button class="btn-num" style="font-size:11px;" onclick="selectQuick('chuc', 'le')">LẺ</button>
                <button class="btn-num" style="background:#FF4500; font-size:11px;" onclick="selectQuick('chuc', 'tatca')">TẤT CẢ</button>
                <button class="btn-num" style="font-size:11px;" onclick="selectQuick('chuc', 'tai')">TÀI</button>
                <button class="btn-num" style="font-size:11px;" onclick="selectQuick('chuc', 'xiu')">XỈU</button>
                <button class="btn-num" style="background:#600; font-size:11px;" onclick="clearSet('chuc')">XÓA</button>
            </div>

            <h4>2. CHỌN ĐUÔI (Hàng đơn vị)</h4>
            <div class="grid-num" id="dv-grid"></div>
            <div class="grid-num" style="grid-template-columns: repeat(6, 1fr); padding-top:0;">
                <button class="btn-num" style="font-size:11px;" onclick="selectQuick('dv', 'chan')">CHẴN</button>
                <button class="btn-num" style="font-size:11px;" onclick="selectQuick('dv', 'le')">LẺ</button>
                <button class="btn-num" style="background:#FF4500; font-size:11px;" onclick="selectQuick('dv', 'tatca')">TẤT CẢ</button>
                <button class="btn-num" style="font-size:11px;" onclick="selectQuick('dv', 'tai')">TÀI</button>
                <button class="btn-num" style="font-size:11px;" onclick="selectQuick('dv', 'xiu')">XỈU</button>
                <button class="btn-num" style="background:#600; font-size:11px;" onclick="clearSet('dv')">XÓA</button>
            </div>

            <button onclick="copyDan()" class="btn-copy-main">SAO CHÉP DÀN SỐ</button>
        </div>

        <div id="xien" class="panel" style="padding-top:10px;">
            <h3 style="color:var(--secondary); text-align:center;">GHÉP XIÊN TỰ ĐỘNG</h3>
            <label style="margin-left:10px; font-size:13px;">Nhập dãy số (cách nhau dấu cách):</label>
            <textarea id="inputNumbers" rows="3" placeholder="Ví dụ: 01 15 24 88 92"></textarea>

            <label style="margin-left:10px; font-size:13px;">Chọn loại xiên:</label>
            <select id="xienType">
                <option value="2">Xiên 2 (Cặp 2 số)</option>
                <option value="3">Xiên 3 (Cặp 3 số)</option>
                <option value="4">Xiên 4 (Cặp 4 số)</option>
            </select>

            <button onclick="processXien()" class="btn-copy-main" style="background: var(--secondary);">BẮT ĐẦU GHÉP XIÊN</button>
            
            <div id="resultContainer" style="display:none;">
                <div id="output" class="result-box"></div>
                <div id="count" style="text-align:right; font-size:12px; margin-right:15px; color:#888;"></div>
                <button id="copyXienBtn" onclick="copyXien()" class="btn-copy-main" style="background: #555;">SAO CHÉP KẾT QUẢ</button>
            </div>
        </div>
    </div>

<script>
    let chucSet = new Set(), dvSet = new Set();
    let currentXienResult = "";
    let currentTabIndex = 0;
    const tabIds = ['main-tool', 'xien'];

    // --- KHỞI TẠO NÚT BẤM ---
    function initButtons() {
        const cGrid = document.getElementById('chuc-grid');
        const dGrid = document.getElementById('dv-grid');
        for(let i=0; i<10; i++) {
            cGrid.innerHTML += `<button class="btn-num" id="c-${i}" onclick="toggleNum('chuc', ${i})">${i}</button>`;
            dGrid.innerHTML += `<button class="btn-num" id="d-${i}" onclick="toggleNum('dv', ${i})">${i}</button>`;
        }
        setupSwipe(); // Kích hoạt tính năng vuốt
    }

    // --- QUẢN LÝ TAB ---
    function openTab(index, tabName) {
        currentTabIndex = index;
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        
        document.getElementById(tabName).classList.add('active');
        document.querySelectorAll('.tab-item')[index].classList.add('active');
        window.scrollTo(0,0);
    }

    // --- TÍNH NĂNG VUỐT (SWIPE) ---
    function setupSwipe() {
        let touchstartX = 0;
        let touchendX = 0;
        const container = document.getElementById('main-container');

        container.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, {passive: true});

        container.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const swipeDistance = touchstartX - touchendX;
            const threshold = 80; // Độ nhạy vuốt

            // Vuốt từ phải sang trái -> Sang tab Xiên
            if (swipeDistance > threshold && currentTabIndex === 0) {
                openTab(1, 'xien');
            }
            // Vuốt từ trái sang phải -> Sang tab Kết quả
            else if (swipeDistance < -threshold && currentTabIndex === 1) {
                openTab(0, 'main-tool');
            }
        }
    }

    // --- LOGIC GHÉP SỐ ---
    function toggleNum(type, n) {
        let set = (type === 'chuc') ? chucSet : dvSet;
        let id = (type === 'chuc') ? `c-${n}` : `d-${n}`;
        const btn = document.getElementById(id);
        
        if(set.has(n)) { set.delete(n); btn.classList.remove('active'); } 
        else { set.add(n); btn.classList.add('active'); }
        renderDan();
    }

    function renderDan() {
        let res = [];
        let chucArr = Array.from(chucSet).sort();
        let dvArr = Array.from(dvSet).sort();
        chucArr.forEach(c => dvArr.forEach(d => res.push(c + "" + d)));
        document.getElementById('display-dan').innerText = res.length > 0 ? "Dàn (" + res.length + " số): " + res.join(", ") : "Dàn số: (Chưa chọn)";
    }

    function selectQuick(type, mode) {
        clearSet(type);
        for(let i=0; i<10; i++) {
            if(mode==='tai' && i>=5) toggleNum(type, i);
            else if(mode==='xiu' && i<5) toggleNum(type, i);
            else if(mode==='le' && i%2!==0) toggleNum(type, i);
            else if(mode==='chan' && i%2===0) toggleNum(type, i);
            else if(mode==='tatca') toggleNum(type, i);
        }
    }

    function clearSet(type) {
        if(type==='chuc') { 
            chucSet.clear(); 
            document.querySelectorAll('#chuc-grid .btn-num').forEach(b=>b.classList.remove('active')); 
        } else { 
            dvSet.clear(); 
            document.querySelectorAll('#dv-grid .btn-num').forEach(b=>b.classList.remove('active')); 
        }
        renderDan();
    }

    function copyDan() {
        const text = document.getElementById('display-dan').innerText;
        if(text.includes(": ")) {
            navigator.clipboard.writeText(text.split(": ")[1]).then(() => alert("✅ Đã sao chép dàn số!"));
        } else { alert("Vui lòng chọn số trước!"); }
    }

    // --- LOGIC XIÊN ---
    function processXien() {
        const input = document.getElementById('inputNumbers').value;
        const size = parseInt(document.getElementById('xienType').value);
        let numbers = [...new Set(input.split(/[\s, \n]+/).filter(n => n.length > 0))];

        if (numbers.length < size) { alert(`Cần nhập ít nhất ${size} số!`); return; }

        let results = [];
        function combine(start, path) {
            if (path.length === size) { results.push(path.join("-")); return; }
            for (let i = start; i < numbers.length; i++) combine(i + 1, [...path, numbers[i]]);
        }
        combine(0, []);
        
        currentXienResult = results.join(", ");
        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('output').innerText = currentXienResult;
        document.getElementById('count').innerText = `Tổng cộng: ${results.length} cặp.`;
    }

    function copyXien() {
        if(currentXienResult) {
            navigator.clipboard.writeText(currentXienResult).then(() => alert("✅ Đã sao chép!"));
        }
    }
    
    window.onload = initButtons;
</script>
</body>
    </html>
